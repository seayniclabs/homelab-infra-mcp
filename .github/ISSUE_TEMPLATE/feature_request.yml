name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - NPM
        - Docker
        - DNS
        - Cross-Domain
        - New Module
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this feature?
